services:
  - type: web
    name: ai-trading-bot
    env: node
    plan: free
    buildCommand: npm install -g pnpm@10.4.1 && pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ENCRYPTION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-trading-bot-db
          property: connectionString

  - type: pserv
    name: ai-trading-bot-db
    plan: free
    ipAllowList: []
